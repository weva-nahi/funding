name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/richat_funding_tracker
            git pull origin main
            docker compose -f docker-compose.prod.yml build
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d
            # NOTE: migrate + collectstatic run automatically on backend
            # startup (see backend command in docker-compose.prod.yml).
            # Running them again here would race the startup command, so
            # they are intentionally omitted.