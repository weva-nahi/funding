name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/richat_funding_tracker
            git pull origin main
            docker compose -f docker-compose.prod.yml build
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d
            # migrate + collectstatic also run automatically on backend
            # container startup (see backend command in
            # docker-compose.prod.yml), so running them again here is
            # redundant but harmless — Django migrations and collectstatic
            # are both idempotent. Running them explicitly here too gives
            # a clearer CI log of exactly what ran during this deploy,
            # rather than relying solely on container startup logs.
            docker compose -f docker-compose.prod.yml exec -T backend python manage.py migrate --noinput
            docker compose -f docker-compose.prod.yml exec -T backend python manage.py collectstatic --noinput