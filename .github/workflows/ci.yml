name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: richat_test_db
          POSTGRES_USER: richat_user
          POSTGRES_PASSWORD: testpassword123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements/development.txt

    - name: Lint with flake8
      run: |
        cd backend
        # Stop the build on syntax errors, undefined names, and common issues.
        flake8 . --count \
          --select=E9,F63,F7,F82,W6,E711,E712 \
          --show-source --statistics \
          --exclude=migrations,__pycache__,.venv

    - name: Run tests
      env:
        SECRET_KEY: ci-test-secret-key-not-for-production
        DJANGO_SETTINGS_MODULE: config.settings.test
        POSTGRES_DB: richat_test_db
        POSTGRES_USER: richat_user
        POSTGRES_PASSWORD: testpassword123
        POSTGRES_HOST: localhost
        POSTGRES_PORT: "5432"
        REDIS_CACHE_URL: redis://localhost:6379/4
        CELERY_BROKER_URL: redis://localhost:6379/1
        CELERY_RESULT_BACKEND: redis://localhost:6379/2
        CHANNEL_LAYERS_BACKEND: redis://localhost:6379/3
      run: |
        cd backend
        pytest -v --tb=short

  frontend-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: |
        cd frontend
        npm ci

    - name: Typecheck
      run: |
        cd frontend
        npx tsc --noEmit

    - name: Test
      run: |
        cd frontend
        npm run test