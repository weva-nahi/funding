version: "3.9"

# Production overrides — use with:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  backend:
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application
               --bind 0.0.0.0:8000
               --workers 3
               --timeout 120 &
             daphne -b 0.0.0.0 -p 8001 config.asgi:application"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DEBUG=False
    ports: []
    restart: always

  celery_worker:
    command: celery -A config worker -l warning --concurrency=4
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    restart: always

  celery_beat:
    command: celery -A config beat -l warning --schedule=/tmp/celerybeat-schedule
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    restart: always

  frontend:
    command: echo "Frontend is served by Nginx in production"
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: always

  db:
    ports: []
    restart: always

  redis:
    ports: []
    restart: always
