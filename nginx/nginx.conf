# Development nginx configuration
# Routes:
#   /api/      → Django (port 8000)
#   /ws/       → Django Channels (port 8000)
#   /admin/    → Django admin (port 8000)
#   /static/   → Served directly from filesystem
#   /media/    → Served directly from filesystem
#   everything else → Vite dev server (port 5173) with SPA fallback

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:5173;
}

server {
    listen 80;
    server_name localhost;
    client_max_body_size 20M;

    # ─── Django API ───────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ─── Django Admin ─────────────────────────────────────────────────────────
    location /admin/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── WebSockets (Django Channels) ─────────────────────────────────────────
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400; # Keep the socket alive for the session
    }

    # ─── Static Files ─────────────────────────────────────────────────────────
    location /static/ {
        alias /usr/share/nginx/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── Media Files ──────────────────────────────────────────────────────────
    location /media/ {
        alias /usr/share/nginx/media/;
        expires 1h;
    }

    # ─── Frontend — Vite Dev Server with HMR + SPA Fallback ──────────────────
    # MUST be last — this is the catch-all.
    # Vite HMR uses a WebSocket connection; the Upgrade/Connection headers
    # are required or the HMR socket fails and the page won't hot-reload.
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ─── Security Headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options   "nosniff"                      always;
    add_header X-XSS-Protection         "1; mode=block"                always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
}