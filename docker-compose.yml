services:
  db:
    image: postgres:16-alpine
    container_name: richat_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-richat_db}
      POSTGRES_USER: ${POSTGRES_USER:-richat_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-richat_password_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-richat_user} -d ${POSTGRES_DB:-richat_db}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: richat_redis
    restart: unless-stopped
    # ── Redis usage map (see backend/config/settings/base.py for the full
    # rationale comment) ─────────────────────────────────────────────────
    # This single Redis instance is logically partitioned by DB index:
    #   DB 1 -> Celery broker
    #   DB 2 -> Celery result backend
    #   DB 3 -> Django Channels layer (WebSockets)
    #   DB 4 -> Django cache / token cache
    # If this becomes a single point of failure in production (Celery
    # broker outage taking down the cache too, or vice versa), split DB 1/2
    # onto a separate Redis instance from DB 3/4 by changing the four
    # *_URL env vars in .env — no code changes required, since every
    # consumer already reads its own independent URL setting.
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: richat_backend
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py create_demo_accounts &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    volumes:
      - ./backend:/app
      - media_data:/app/media
      - static_data:/app/staticfiles
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      CORS_ALLOW_ALL_ORIGINS: "True"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - "curl -sf http://localhost:8000/api/v1/health/ || exit 1"
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: richat_celery_worker
    restart: unless-stopped
    command: celery -A config worker -l info --concurrency=4 -Q celery,default
    volumes:
      - ./backend:/app
      - media_data:/app/media
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping --timeout 5 2>/dev/null | grep -q pong || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 60s

  celery_scraping_worker:
    build:
      context: ./backend
      # Dedicated image with Chromium/chromedriver — the OECD Selenium
      # scraper is the only thing that needs them, so they're isolated to
      # this one service instead of bloating backend/celery_worker/celery_beat.
      dockerfile: Dockerfile.scraping
    container_name: richat_celery_scraping
    restart: unless-stopped
    command: celery -A config worker -l info --concurrency=2 -Q scraping
    volumes:
      - ./backend:/app
      - media_data:/app/media
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping --destination celery@$$HOSTNAME --timeout 5 2>/dev/null | grep -q pong || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 90s

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: richat_celery_beat
    restart: unless-stopped
    command: >
      celery -A config beat -l info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: richat_frontend
    restart: unless-stopped
    command: npm run dev -- --host 0.0.0.0 --port 5173
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: ""
      VITE_WS_URL: ""
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  media_data:
  static_data: