<!DOCTYPE html>
<html dir="{{ dir|default:'ltr' }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; background: #f4f7fa; }
        .container { max-width: 600px; margin: 0 auto; background: #ffffff; border-radius: 12px; overflow: hidden; }
        .logo-header { background: #ffffff; padding: 32px 32px 16px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        .logo-badge { display: inline-flex; align-items: center; justify-content: center; width: 56px; height: 56px; background: linear-gradient(135deg, #0f766e, #134e4a); border-radius: 14px; margin: 0 auto 12px; }
        .logo-badge span { color: #ffffff; font-size: 24px; font-weight: 800; }
        .logo-name { color: #0f766e; font-size: 20px; font-weight: 700; margin: 0; }
        .content { padding: 32px; color: #334155; line-height: 1.6; }
        .btn-wrapper { text-align: center; margin: 24px 0; }
        .btn { display: inline-block; background: #0f766e; color: #fff !important; text-decoration: none; padding: 14px 36px; border-radius: 8px; font-weight: 600; font-size: 15px; }
        .footer { padding: 24px; text-align: center; color: #94a3b8; font-size: 12px; border-top: 1px solid #e2e8f0; }
        .footer a { color: #64748b; text-decoration: underline; }
        [dir="rtl"] .content, [dir="rtl"] .footer { text-align: right; }
    </style>
</head>
<body>
    <div style="padding: 24px 0; background: #f4f7fa;">
        <div class="container">
            <div class="logo-header">
                <div class="logo-badge"><span>R</span></div>
                <p class="logo-name">Richat Funding Tracker</p>
            </div>
            <div class="content">
                {% block content %}{% endblock %}
            </div>
            <div class="footer">
                <p>{{ footer_t.copyright }}</p>
                <p>{{ footer_t.footer_note }}</p>
                {% if unsubscribe_url %}
                <p><a href="{{ unsubscribe_url }}">{{ unsubscribe_label }}</a></p>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
