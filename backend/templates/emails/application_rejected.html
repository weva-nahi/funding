{% extends "emails/base.html" %}
{% block content %}
<h2>{{ t.heading }}</h2>
<p>{{ t.greeting }}</p>
<p>{{ t.body|safe }}</p>
{% if application.rejection_reason %}
<div style="background: #fef2f2; border-left: 4px solid #dc2626; padding: 12px 16px; margin: 16px 0;">
    <strong>{{ t.reason_label }}</strong><br>{{ application.rejection_reason }}
</div>
{% endif %}
<p>{{ t.encouragement }}</p>
<a href="{{ frontend_url }}/opportunities" class="btn">{{ t.button }}</a>
{% endblock %}
