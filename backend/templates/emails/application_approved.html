{% extends "emails/base.html" %}
{% block content %}
<h2>{{ t.heading }}</h2>
<p>{{ t.greeting }}</p>
<p>{{ t.body|safe }}</p>
{% if application.admin_comment %}
<div style="background: #f0fdf4; border-left: 4px solid #16a34a; padding: 12px 16px; margin: 16px 0;">
    <strong>{{ t.comment_label }}</strong><br>{{ application.admin_comment }}
</div>
{% endif %}
<a href="{{ frontend_url }}/applications/{{ application.id }}" class="btn">{{ t.button }}</a>
{% endblock %}
