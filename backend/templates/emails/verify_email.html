{% extends "emails/base.html" %}
{% block content %}
<h2 style="color: #0f172a; font-size: 22px; margin: 0 0 8px;">{{ t.heading }}</h2>
<p>{{ t.greeting }}</p>
<p>{{ t.body }}</p>
<div class="btn-wrapper">
    <a href="{{ verify_url }}" class="btn">{{ t.button }}</a>
</div>
<p style="color: #64748b; font-size: 13px;">{{ t.expiry }}</p>
{% endblock %}
